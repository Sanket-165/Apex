<!DOCTYPE html>
<html>
<head>
    <title>FitZone Gym</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background-color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .home {
            padding: 30px 10px;
        }

        .chat-container {
            width: 400px;
            max-width: 90%;
            background-color: white;
            margin: auto;
            border: 1px solid lightgray;
            padding: 10px;
            border-radius: 10px;
        }

        .chat-header {
            background-color: red;
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
        }

        .chatbox {
            height: 300px;
            overflow-y: auto;
            text-align: left;
            padding: 10px;
        }

        .bot-message {
            background-color: #f0f0f0;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .user-message {
            background-color: lightgreen;
            padding: 10px;
            margin-bottom: 10px;
            text-align: right;
            border-radius: 8px;
        }

        .input-area {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 5px;
        }

        input {
            width: 65%;
            padding: 8px;
            border: 1px solid gray;
            border-radius: 5px;
        }

        button {
            padding: 8px 15px;
            background-color: red;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkred;
        }
    </style>
</head>

<body>

    <section class="home">
        <h1>Welcome to FitZone 🏋</h1>
        <p>Your fitness partner</p>
    </section>

    <div class="chat-container">

        <div class="chat-header">
            FitZone Assistant
        </div>

        <div id="chatbox" class="chatbox">
            <div class="bot-message">
                Hello! Ask me about gym plans, timing, trainers etc.
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type here...">
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

    <script>
        function sendMessage() {

            let input = document.getElementById("userInput");
            let message = input.value.trim();

            if (message === "") return;

            displayMessage(message, "user-message");

            let response = getResponse(message.toLowerCase());

            setTimeout(() => {
                displayMessage(response, "bot-message");
            }, 500);

            input.value = "";
        }

        function displayMessage(message, className) {

            let chatbox = document.getElementById("chatbox");

            let div = document.createElement("div");
            div.className = className;
            div.innerText = message;

            chatbox.appendChild(div);

            chatbox.scrollTop = chatbox.scrollHeight;
        }

        document.getElementById("userInput")
            .addEventListener("keypress", function(event) {

            if (event.key === "Enter") {
                sendMessage();
            }
        });

        function getResponse(message) {

            if (
                message.includes("membership") ||
                message.includes("fees") ||
                message.includes("plan")
            ) {
                return "We offer 3 types of plans:\n1. Monthly Plan: ₹999/month\n2. 3-Month Plan: ₹2499\n3. Yearly Plan: ₹8999\nContact us for current offers!";
            }

            if (message.includes("owner")) {
                return "The gym is owned by FitZone Team.";
            }

            else if (message.includes("monthly")) {
                return "Our Monthly Plan costs ₹999 per month.";
            }

            else if (
                message.includes("3 month") ||
                message.includes("three month")
            ) {
                return "Our 3-Month Plan costs ₹2499 and saves you money compared to monthly billing.";
            }

            else if (
                message.includes("yearly") ||
                message.includes("annual")
            ) {
                return "Our Yearly Plan costs ₹8999 and includes 2 free personal training sessions.";
            }

            else if (
                message.includes("timing") ||
                message.includes("hours") ||
                message.includes("open")
            ) {
                return "We are open from 5 AM to 11 PM, Monday to Sunday.";
            }

            else if (
                message.includes("trainer") ||
                message.includes("personal training")
            ) {
                return "Yes, we have certified personal trainers available.";
            }

            else if (
                message.includes("diet") ||
                message.includes("nutrition")
            ) {
                return "We provide customized diet plans for premium and yearly members.";
            }

            else if (message.includes("weight loss")) {
                return "We have special weight loss programs with cardio and diet guidance.";
            }

            else if (
                message.includes("muscle") ||
                message.includes("bodybuilding")
            ) {
                return "Our muscle gain program includes strength training and protein guidance.";
            }

            else if (
                message.includes("equipment") ||
                message.includes("machines")
            ) {
                return "We have modern equipment including treadmills, cross trainers, benches, and free weights.";
            }

            else if (
                message.includes("trial") ||
                message.includes("demo")
            ) {
                return "Yes! We offer a 1-day free trial.";
            }

            else if (
                message.includes("contact") ||
                message.includes("phone")
            ) {
                return "You can contact us at 9876543210.";
            }

            else if (
                message.includes("location") ||
                message.includes("address")
            ) {
                return "We are located near Elpro City Square Mall, Chinchwad.";
            }

            else {
                return "Sorry, I didn't understand that. You can ask about membership plans, timings, trainers, diet, weight loss, or equipment.";
            }
        }
    </script>

</body>
</html>
