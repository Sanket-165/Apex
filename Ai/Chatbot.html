<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>FitZone Gym</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            color:#222;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .container{
            width:100%;
            max-width:420px;
            background:white;
            border-radius:12px;
            overflow:hidden;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
        }

        .header{
            background:#111827;
            color:white;
            padding:20px;
            text-align:center;
        }

        .header h1{
            font-size:28px;
            margin-bottom:5px;
        }

        .header p{
            font-size:14px;
            color:#d1d5db;
        }

        .chatbox{
            height:380px;
            overflow-y:auto;
            padding:15px;
            background:#fafafa;
        }

        .message{
            padding:10px 14px;
            border-radius:10px;
            margin-bottom:12px;
            max-width:80%;
            line-height:1.5;
            font-size:14px;
        }

        .bot{
            background:#e5e7eb;
            color:#111;
        }

        .user{
            background:#2563eb;
            color:white;
            margin-left:auto;
            text-align:right;
        }

        .input-area{
            display:flex;
            gap:10px;
            padding:15px;
            border-top:1px solid #ddd;
            background:white;
        }

        input{
            flex:1;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
            font-size:14px;
        }

        input:focus{
            border-color:#2563eb;
        }

        button{
            padding:12px 18px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            cursor:pointer;
            font-size:14px;
        }

        button:hover{
            background:#1d4ed8;
        }

    </style>
</head>

<body>

    <div class="container">

        <div class="header">
            <h1>FitZone Gym</h1>
            <p>Your Fitness Partner</p>
        </div>

        <div class="chatbox" id="chatbox">

            <div class="message bot">
                Hello 👋 Ask me about gym plans, timings, trainers, diet and more.
            </div>

        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your message...">
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

    <script>

        function displayMessage(message, type){

            let chatbox = document.getElementById("chatbox");

            let div = document.createElement("div");

            div.classList.add("message", type);

            div.innerText = message;

            chatbox.appendChild(div);

            chatbox.scrollTop = chatbox.scrollHeight;
        }

        function getResponse(message){

            if(message.includes("membership") || message.includes("fees") || message.includes("plan")){
                return "Monthly Plan: ₹999\n3-Month Plan: ₹2499\nYearly Plan: ₹8999";
            }

            else if(message.includes("timing") || message.includes("hours")){
                return "We are open daily from 5 AM to 11 PM.";
            }

            else if(message.includes("trainer")){
                return "Certified personal trainers are available.";
            }

            else if(message.includes("diet")){
                return "Customized diet plans are available for premium members.";
            }

            else if(message.includes("trial")){
                return "Yes! We offer a 1-day free trial.";
            }

            else if(message.includes("contact")){
                return "Contact us at: 9876543210";
            }

            else if(message.includes("location")){
                return "We are located near Elpro City Square Mall, Chinchwad.";
            }

            else{
                return "Please ask about plans, trainers, timings, diet or location.";
            }
        }

        function sendMessage(){

            let input = document.getElementById("userInput");

            let message = input.value.trim();

            if(message === ""){
                return;
            }

            displayMessage(message, "user");

            let response = getResponse(message.toLowerCase());

            setTimeout(() => {
                displayMessage(response, "bot");
            }, 400);

            input.value = "";
        }

        document.getElementById("userInput").addEventListener("keypress", function(event){

            if(event.key === "Enter"){
                sendMessage();
            }

        });

    </script>

</body>
</html>
